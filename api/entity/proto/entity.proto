syntax = "proto3";

package resource.api.entity;

option go_package = "resource/api/entity;entity";
option java_multiple_files = true;
option java_package = "resource.api.entity";
option java_outer_classname = "EntityV1";

import "validate/validate.proto";



message LoadEntityReply {
  message EntityField{
    string name = 1;
    string comment = 2;
  }
  message Entity {
    string database = 1;
    string name = 2;
    string comment = 3;
    repeated EntityField fields = 4;
  }
  uint32 total = 1;
  repeated Entity list = 2;
}
