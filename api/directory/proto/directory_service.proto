syntax = "proto3";

package resource.api.directory;
option go_package = "resource/api/directory;directory";
option java_multiple_files = true;
option java_package = "resource.api.directory";

import "api/directory/proto/directory.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";


service Directory{

  // GetDirectory 获取指定的文件目录信息
  rpc GetDirectory (GetDirectoryRequest) returns (GetDirectoryReply) {
    option (google.api.http) = {
      get: "/resource/api/directory",
    };
  }

  // ListDirectory 获取文件目录信息列表
  rpc ListDirectory (google.protobuf.Empty) returns (ListDirectoryReply) {
    option (google.api.http) = {
      get: "/resource/api/directories",
    };
  }

  // CreateDirectory 创建文件目录信息
  rpc CreateDirectory (CreateDirectoryRequest) returns (CreateDirectoryReply) {
    option (google.api.http) = {
      post: "/resource/api/directory",
      body: "*"
    };
  }

  // UpdateDirectory 更新文件目录信息
  rpc UpdateDirectory (UpdateDirectoryRequest) returns (UpdateDirectoryReply) {
    option (google.api.http) = {
      put: "/resource/api/directory",
      body: "*"
    };
  }

  // DeleteDirectory 删除文件目录信息
  rpc DeleteDirectory (DeleteDirectoryRequest) returns (DeleteDirectoryReply) {
    option (google.api.http) = {
      delete: "/resource/api/directory",
    };
  }

}