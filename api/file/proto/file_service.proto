syntax = "proto3";

package resource.api.file;
option go_package = ".;file";
option java_multiple_files = true;
option java_package = "resource.api.file";

import "api/file/proto/file.proto";
import "google/api/annotations.proto";

service File{

  // GetFile 获取指定的文件信息
  rpc GetUserFile (GetUserFileRequest) returns (GetUserFileReply) {
    option (google.api.http) = {
      get: "/resource/api/file",
    };
  }

  // GetFile 获取指定的文件信息
  rpc GetFileBytes (GetFileBytesRequest) returns (stream GetFileBytesReply) {}

  // ListUserFile 获取文件信息列表
  rpc ListUserFile (ListUserFileRequest) returns (ListUserFileReply) {
    option (google.api.http) = {
      get: "/resource/api/files",
    };
  }

  // PrepareUploadFile 预上传文件信息
  rpc PrepareUploadFile (PrepareUploadFileRequest) returns (PrepareUploadFileReply) {
    option (google.api.http) = {
      post: "/resource/api/file/prepare_upload",
      body: "*",
    };
  }

  // UploadFile 上传文件
  rpc UploadFile(UploadFileRequest) returns (UploadFileReply){}

  // UploadFileByURL 上传文件
  rpc UploadFileByURL(UploadFileByURLRequest) returns (UploadFileByURLReply){}

  // UpdateFile 更新文件信息
  rpc UpdateUserFile (UpdateUserFileRequest) returns (UpdateUserFileReply) {
    option (google.api.http) = {
      put: "/resource/api/file",
      body: "*"
    };
  }

  // DeleteUserFile 删除文件信息
  rpc DeleteUserFile (DeleteUserFileRequest) returns (DeleteUserFileReply) {
    option (google.api.http) = {
      delete: "/resource/api/file",
    };
  }

}